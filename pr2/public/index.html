<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Управление товарами</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background: #f0f2f5;
         color: #333;
         padding: 30px;
      }

      h1 {
         text-align: center;
         margin-bottom: 30px;
         color: #2c3e50;
      }

      /* ===== Форма добавления ===== */
      .form-card {
         max-width: 500px;
         margin: 0 auto 40px;
         background: #fff;
         border-radius: 12px;
         padding: 24px;
         box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      .form-card h2 {
         margin-bottom: 16px;
         font-size: 18px;
         color: #2c3e50;
      }

      .form-row {
         display: flex;
         gap: 12px;
         margin-bottom: 12px;
      }

      .form-row input {
         flex: 1;
         padding: 10px 14px;
         border: 1px solid #ddd;
         border-radius: 8px;
         font-size: 14px;
         outline: none;
         transition: border-color 0.2s;
      }

      .form-row input:focus {
         border-color: #3498db;
      }

      .btn {
         padding: 10px 20px;
         border: none;
         border-radius: 8px;
         font-size: 14px;
         font-weight: 600;
         cursor: pointer;
         transition: background-color 0.2s, transform 0.1s;
      }

      .btn:active {
         transform: scale(0.97);
      }

      .btn-primary {
         background: #3498db;
         color: #fff;
         width: 100%;
      }

      .btn-primary:hover {
         background: #2980b9;
      }

      .btn-edit {
         background: #f39c12;
         color: #fff;
         padding: 6px 14px;
         font-size: 13px;
      }

      .btn-edit:hover {
         background: #e67e22;
      }

      .btn-delete {
         background: #e74c3c;
         color: #fff;
         padding: 6px 14px;
         font-size: 13px;
      }

      .btn-delete:hover {
         background: #c0392b;
      }

      .btn-save {
         background: #2ecc71;
         color: #fff;
         padding: 6px 14px;
         font-size: 13px;
      }

      .btn-save:hover {
         background: #27ae60;
      }

      .btn-cancel {
         background: #95a5a6;
         color: #fff;
         padding: 6px 14px;
         font-size: 13px;
      }

      .btn-cancel:hover {
         background: #7f8c8d;
      }

      /* ===== Список товаров ===== */
      .products-grid {
         max-width: 800px;
         margin: 0 auto;
         display: grid;
         grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
         gap: 20px;
      }

      .product-card {
         background: #fff;
         border-radius: 12px;
         padding: 20px;
         box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
         display: flex;
         flex-direction: column;
         transition: transform 0.2s;
      }

      .product-card:hover {
         transform: translateY(-3px);
      }

      .product-card__id {
         font-size: 12px;
         color: #aaa;
         margin-bottom: 6px;
      }

      .product-card__name {
         font-size: 18px;
         font-weight: 600;
         color: #2c3e50;
         margin-bottom: 8px;
      }

      .product-card__price {
         font-size: 20px;
         font-weight: 700;
         color: #2ecc71;
         margin-bottom: 16px;
      }

      .product-card__actions {
         display: flex;
         gap: 8px;
         margin-top: auto;
      }

      /* ===== Режим редактирования ===== */
      .edit-input {
         width: 100%;
         padding: 8px 10px;
         border: 1px solid #ddd;
         border-radius: 6px;
         font-size: 14px;
         margin-bottom: 8px;
         outline: none;
      }

      .edit-input:focus {
         border-color: #f39c12;
      }

      .empty-state {
         text-align: center;
         color: #aaa;
         font-size: 16px;
         grid-column: 1 / -1;
         padding: 40px;
      }

      .notification {
         position: fixed;
         top: 20px;
         right: 20px;
         padding: 12px 20px;
         border-radius: 8px;
         color: #fff;
         font-weight: 600;
         font-size: 14px;
         opacity: 0;
         transform: translateY(-10px);
         transition: opacity 0.3s, transform 0.3s;
         z-index: 1000;
      }

      .notification.show {
         opacity: 1;
         transform: translateY(0);
      }

      .notification.success {
         background: #2ecc71;
      }

      .notification.error {
         background: #e74c3c;
      }
   </style>
</head>

<body>

   <h1>Управление товарами</h1>

   <!-- Форма добавления -->
   <div class="form-card">
      <h2>Добавить товар</h2>
      <div class="form-row">
         <input type="text" id="inp-name" placeholder="Название товара">
         <input type="number" id="inp-price" placeholder="Стоимость (₽)" min="0">
      </div>
      <button class="btn btn-primary" onclick="addProduct()">Добавить</button>
   </div>

   <!-- Список товаров -->
   <div class="products-grid" id="products-grid"></div>

   <!-- Уведомления -->
   <div class="notification" id="notification"></div>

   <script>
      const API = '/products';

      // ===== Уведомления =====
      function notify(text, type = 'success') {
         const el = document.getElementById('notification');
         el.textContent = text;
         el.className = 'notification ' + type + ' show';
         setTimeout(() => el.classList.remove('show'), 2500);
      }

      // ===== Загрузить и отрисовать товары =====
      async function loadProducts() {
         const res = await fetch(API);
         const products = await res.json();
         const grid = document.getElementById('products-grid');

         if (products.length === 0) {
            grid.innerHTML = '<div class="empty-state">Товаров пока нет. Добавьте первый!</div>';
            return;
         }

         grid.innerHTML = products.map(p => `
                <div class="product-card" id="card-${p.id}">
                    <div class="product-card__id">ID: ${p.id}</div>
                    <div class="product-card__name">${escapeHtml(p.name)}</div>
                    <div class="product-card__price">${Number(p.price).toLocaleString('ru-RU')} ₽</div>
                    <div class="product-card__actions">
                        <button class="btn btn-edit" onclick="startEdit('${p.id}', '${escapeAttr(p.name)}', ${p.price})">Изменить</button>
                        <button class="btn btn-delete" onclick="deleteProduct('${p.id}')">Удалить</button>
                    </div>
                </div>
            `).join('');
      }

      // ===== Добавить товар =====
      async function addProduct() {
         const nameInput = document.getElementById('inp-name');
         const priceInput = document.getElementById('inp-price');
         const name = nameInput.value.trim();
         const price = Number(priceInput.value);

         if (!name) { notify('Введите название товара', 'error'); return; }
         if (!price || price <= 0) { notify('Введите корректную стоимость', 'error'); return; }

         await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, price })
         });

         nameInput.value = '';
         priceInput.value = '';
         notify('Товар добавлен!');
         loadProducts();
      }

      // ===== Удалить товар =====
      async function deleteProduct(id) {
         if (!confirm('Удалить этот товар?')) return;

         await fetch(`${API}/${id}`, { method: 'DELETE' });
         notify('Товар удалён!');
         loadProducts();
      }

      // ===== Начать редактирование =====
      function startEdit(id, name, price) {
         const card = document.getElementById(`card-${id}`);
         card.innerHTML = `
                <input class="edit-input" id="edit-name-${id}" value="${escapeAttr(name)}" placeholder="Название">
                <input class="edit-input" id="edit-price-${id}" type="number" value="${price}" placeholder="Стоимость" min="0">
                <div class="product-card__actions">
                    <button class="btn btn-save" onclick="saveEdit('${id}')">Сохранить</button>
                    <button class="btn btn-cancel" onclick="loadProducts()">Отмена</button>
                </div>
            `;
      }

      // ===== Сохранить редактирование =====
      async function saveEdit(id) {
         const name = document.getElementById(`edit-name-${id}`).value.trim();
         const price = Number(document.getElementById(`edit-price-${id}`).value);

         if (!name) { notify('Название не может быть пустым', 'error'); return; }
         if (!price || price <= 0) { notify('Введите корректную стоимость', 'error'); return; }

         await fetch(`${API}/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, price })
         });

         notify('Товар обновлён!');
         loadProducts();
      }

      // ===== Утилиты =====
      function escapeHtml(str) {
         return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      function escapeAttr(str) {
         return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      }

      // Загрузка при открытии страницы
      loadProducts();
   </script>
</body>

</html>
