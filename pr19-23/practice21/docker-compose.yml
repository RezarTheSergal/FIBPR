services:
  redis:
    image: redis:7-alpine
    container_name: practice21_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - redisdata:/data

  server:
    container_name: my_server_21
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "3090:3090"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=3090
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  redisdata:
