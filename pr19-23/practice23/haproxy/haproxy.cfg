global
    log stdout format raw local0
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
frontend http_front
    bind *:80
    default_backend http_back
backend http_back
    balance roundrobin
    server backend1 backend1:3095 check
    server backend2 backend2:3096 check
