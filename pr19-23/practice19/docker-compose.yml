version: '3.8'
services:
  postgres:
    image: postgres:17
    container_name: practice19_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  server:
    container_name: practice19_server
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "3088:3088"
    environment:
      - NODE_ENV=production
      - PORT=3088
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
      
volumes:
  pgdata:
